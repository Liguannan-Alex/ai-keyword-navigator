<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="AI 通用关键词导航，支持搜索、分类筛选、搜索引擎查询和常用大模型跳转。"
    />
    <title>AI 通用关键词导航</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">AI Keyword Navigator</p>
          <h1>AI 通用关键词导航</h1>
        </div>
        <div class="search-block" role="search">
          <label class="visually-hidden" for="searchInput">搜索关键词</label>
          <input
            id="searchInput"
            type="search"
            autocomplete="off"
            placeholder="搜索中文、英文、缩写或别名"
          />
          <button id="clearSearch" class="icon-button" type="button" title="清空搜索" aria-label="清空搜索">
            ×
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar" aria-label="关键词分类">
          <div class="canvas-panel">
            <canvas id="signalCanvas" width="520" height="300" aria-label="AI 关键词关系图"></canvas>
          </div>
          <nav id="categoryList" class="category-list"></nav>
        </aside>

        <section class="results-pane" aria-label="关键词列表">
          <div class="toolbar">
            <div>
              <p class="section-label">关键词</p>
              <h2 id="resultTitle">全部关键词</h2>
            </div>
            <p id="resultCount" class="result-count"></p>
          </div>
          <div id="keywordGrid" class="keyword-grid"></div>
          <div id="emptyState" class="empty-state" hidden>
            <strong>没有匹配结果</strong>
            <span>换一个中文名、英文名或缩写再试。</span>
          </div>
        </section>

        <aside class="detail-pane" aria-label="关键词详情">
          <div id="detailContent" class="detail-content"></div>
        </aside>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
